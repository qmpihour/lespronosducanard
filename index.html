<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pronostics Coupe du Monde 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ─── RESET & BASE ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1e5c1e;
      --surface:     rgba(0,0,0,0.62);
      --card:        rgba(0,0,0,0.60);
      --card-hover:  rgba(0,0,0,0.70);
      --accent:      #2e7d32;
      --accent-soft: rgba(46,125,50,0.25);
      --accent2:     #66bb6a;
      --gold:        #f5c518;
      --silver:      #c0c0c0;
      --bronze:      #cd7f32;
      --text:        #ffffff;
      --muted:       rgba(255,255,255,0.45);
      --border:      rgba(255,255,255,0.15);
      --radius:      12px;
      --radius-lg:   18px;
      --font:        'Inter', system-ui, sans-serif;
      --transition:  0.2s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font);
      background: #1e5c1e;
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── TERRAIN FIXE EN BACKGROUND ───────────────────────────── */
    #pitch-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100vh;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    #pitch-bg svg {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ─── HEADER ────────────────────────────────────────────────── */
    header {
      background: rgba(0,0,0,0.62);
      border-bottom: 1.5px solid rgba(255,255,255,0.18);
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.65rem 1rem 0.4rem;
    }

    .header-tabs-row {
      display: flex;
      justify-content: center;
      padding: 0 1rem 0.5rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
    }

    .logo-title {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      line-height: 1.2;
    }

    .logo-main {
      font-size: 0.92rem;
      font-weight: 800;
      color: #f5c518;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }

    .logo-sub {
      font-size: 0.62rem;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .duck-logo {
      width: 42px;
      height: 42px;
      border-radius: 9px;
      overflow: hidden;
      background: #f5c518;
      flex-shrink: 0;
    }

    .duck-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .duck-flip img {
      transform: scaleX(-1);
    }





    /* ─── TABS NAV ──────────────────────────────────────────────── */
    .tabs-nav {
      display: flex;
      gap: 4px;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 3px;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      font: 500 0.8rem var(--font);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .tab-btn.active {
      background: #2e7d32;
      color: #fff;
      font-weight: 700;
    }

    .tab-btn:hover:not(.active) {
      color: var(--text);
      background: rgba(255,255,255,0.06);
    }

    /* ─── MAIN LAYOUT ───────────────────────────────────────────── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem;
      position: relative;
      z-index: 1;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ─── SECTION TITLE ─────────────────────────────────────────── */
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      padding-left: 2px;
    }

    /* ─── MATCH CARD ────────────────────────────────────────────── */
    /* ─── ARCHIVE ─────────────────────────────────────────────── */
    .day-section { margin-bottom: 1.25rem; }

    .day-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.55rem;
      padding-left: 2px;
    }

    .day-label.day-today { color: rgba(255,255,255,0.72); }
    .day-label.day-past  { color: rgba(255,255,255,0.35); }

    .archive-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1rem 0 1.1rem;
    }

    .archive-divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.12);
    }

    .archive-divider-label {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
    }

    /* Cartes passées : même apparence, opacity 70% + grayscale */
    .match-card.card-past {
      opacity: 0.70;
      filter: grayscale(1);
    }

    .match-card {
      background: rgba(0,0,0,0.60);
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: var(--radius-lg);
      margin-bottom: 1rem;
      overflow: hidden;
      animation: fadeUp 0.35s ease both;
      backdrop-filter: blur(6px);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .match-card:nth-child(2) { animation-delay: 0.05s; }
    .match-card:nth-child(3) { animation-delay: 0.10s; }
    .match-card:nth-child(4) { animation-delay: 0.15s; }
    .match-card:nth-child(5) { animation-delay: 0.20s; }

    .card-header {
      padding: 1rem 1.25rem 0.75rem;
    }

    .match-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .match-group {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .match-status {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    .status-upcoming {
      background: rgba(79,142,247,0.15);
      color: var(--accent2);
    }

    .status-live {
      background: rgba(76,175,80,0.22);
      color: #a5d6a7;
      border: 1px solid rgba(76,175,80,0.4);
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }

    .status-finished {
      background: rgba(255,255,255,0.06);
      color: var(--muted);
    }

    /* ─── TEAMS ROW ─────────────────────────────────────────────── */
    .teams-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 0.5rem;
    }

    .team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
    }

    .team-flag { font-size: 2.4rem; line-height: 1; }

    .team-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }

    .score-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .score-digits {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: var(--text);
      line-height: 1;
    }

    .score-sep {
      color: var(--muted);
      font-weight: 300;
      padding: 0 1px;
    }

    .score-time {
      font-size: 0.65rem;
      color: var(--muted);
      font-weight: 500;
    }

    .score-upcoming { color: var(--muted) !important; }

    .score-placeholder {
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
      padding: 0.4rem 0;
    }

    /* ─── PRONOS TABLE ──────────────────────────────────────────── */
    .pronos-section {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 0 1.25rem;
    }

    .pronos-title { display: none; }

    .pronos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 6px;
    }

    .prono-chip {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.78rem;
      transition: var(--transition);
    }

    .prono-chip:hover { background: rgba(255,255,255,0.07); }

    .prono-name {
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70px;
    }

    .prono-right {
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .prono-score {
      font-weight: 700;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .prono-result { font-size: 1rem; }

    .hidden-prono {
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
      padding: 0.4rem 0 0;
    }

    /* ─── CLASSEMENT ────────────────────────────────────────────── */
    .ranking-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 6px;
    }

    .ranking-table th {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 0 0.75rem 0.5rem;
      text-align: left;
    }

    .ranking-table th:not(:first-child) { text-align: center; }

    .ranking-table td {
      padding: 0.7rem 0.75rem;
      background: rgba(0,0,0,0.60);
      border: 1px solid rgba(255,255,255,0.15);
      transition: var(--transition);
      backdrop-filter: blur(6px);
    }

    .ranking-table td:first-child {
      border-radius: var(--radius) 0 0 var(--radius);
      border-right: none;
    }

    .ranking-table td:last-child {
      border-radius: 0 var(--radius) var(--radius) 0;
      border-left: none;
      text-align: center;
    }

    .ranking-table td:not(:first-child):not(:last-child) {
      border-left: none;
      border-right: none;
      text-align: center;
    }

    .ranking-table tbody tr:hover td { background: var(--card-hover); }

    .rank-cell {
      font-size: 1.1rem;
      font-weight: 800;
      width: 44px;
    }

    .rank-number {
      display: inline-block;
      width: 26px;
      text-align: center;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
    }

    .player-name {
      font-weight: 600;
      font-size: 0.9rem;
    }

    .pts-cell {
      font-size: 1.1rem;
      font-weight: 800;
      color: #66bb6a;
    }

    .stat-cell {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--muted);
    }

    .podium-1 .player-name { color: var(--gold); }
    .podium-2 .player-name { color: var(--silver); }
    .podium-3 .player-name { color: var(--bronze); }

    /* ─── LOADING / ERROR ───────────────────────────────────────── */
    /* ─── TIROIR PRONOSTICS ────────────────────────────────────────── */
    .pronos-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      padding: 0.65rem 0;
      background: none;
      border: none;
      width: 100%;
      color: inherit;
    }

    .pronos-toggle-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .pronos-toggle-icon-btn {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .pronos-toggle-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.03em;
    }

    .pronos-toggle-count {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.3);
      font-weight: 500;
    }

    .pronos-toggle-chevron {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.25);
      transition: transform 0.2s ease;
      flex-shrink: 0;
    }

    .pronos-toggle-chevron.open { transform: rotate(180deg); }

    .pronos-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.28s ease, opacity 0.2s ease;
      opacity: 0;
    }

    .pronos-body.open {
      max-height: 800px;
      opacity: 1;
    }

    .state-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      color: var(--muted);
      gap: 0.75rem;
      text-align: center;
    }

    .state-icon { font-size: 2.5rem; }

    .state-block p { font-size: 0.9rem; line-height: 1.6; max-width: 340px; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(233,69,96,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── FOOTER ────────────────────────────────────────────────── */
    .footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.62);
      border-top: 1.5px solid rgba(255,255,255,0.12);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.38);
      z-index: 50;
      backdrop-filter: blur(8px);
    }

    .refresh-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #66bb6a;
      flex-shrink: 0;
    }

    .refresh-dot.refreshing { background: var(--accent); animation: pulse 0.8s infinite; }

    #refresh-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 1rem;
      width: 26px;
      height: 26px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }
    #refresh-btn:hover { background: rgba(255,255,255,0.12); color: var(--text); }
    #refresh-btn.spinning { animation: spin 0.6s linear infinite; color: var(--accent); }

    /* ─── RESPONSIVE ────────────────────────────────────────────── */
    @media (max-width: 480px) {
      .team-flag { font-size: 1.8rem; }
      .score-digits { font-size: 1.7rem; }
      .team-name { font-size: 0.72rem; }
      .pronos-grid { grid-template-columns: repeat(2, 1fr); }
      .ranking-table th, .ranking-table td { padding: 0.55rem 0.5rem; font-size: 0.8rem; }
      .pts-cell { font-size: 0.95rem; }
    }
  </style>
</head>
<body>

<!-- ═══ TERRAIN DE FOOT — BACKGROUND FIXE ══════════════════════ -->

  <svg viewBox="0 0 680 1048" preserveAspectRatio="xMidYMin slice" xmlns="http://www.w3.org/2000/svg">

    <!-- Point de penalty bas -->
    <circle cx="340" cy="915" r="4" fill="rgba(255,255,255,0.85)"/>
    <!-- Arc de cercle bas (vers intérieur terrain) -->
    <path d="M 271 863 A 86 86 0 0 1 409 863" fill="none" stroke="rgba(255,255,255,0.72)" stroke-width="2"/>
    <!-- Corners -->
    <path d="M 40 40 A 10 10 0 0 1 50 30"     fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2"/>
    <path d="M 630 30 A 10 10 0 0 1 640 40"   fill="none" stroke="rgba(255,255,255,0.68)" stroke-width="2"/>

<!-- ════════════════════════════════════════════════════════════ -->

<header>
  <div class="header-inner">

// ── Parsing CSV basique ────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  return lines.slice(1).map(line => {
    const cells = [];
    let cur = "", inQ = false;
    for (const ch of line) {
      if (ch === '"') { inQ = !inQ; continue; }
      if (ch === "," && !inQ) { cells.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    cells.push(cur.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cells[i] || "").trim());
    return obj;
  });
}

// ── Fetch CSV — direct d'abord, proxies en fallback ──────────
// Google Sheets CSV publiés autorisent le CORS nativement.
async function fetchCSV(url) {
  const attempts = [
    () => fetch(url, { signal: AbortSignal.timeout(8000) }),
    () => fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(8000) }),
    () => fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`, { signal: AbortSignal.timeout(8000) }),
  ];
  let lastErr;
  for (const attempt of attempts) {
    try {
      const res = await attempt();
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      if (!text.trim()) throw new Error("Réponse vide");
      return parseCSV(text);
    } catch(e) { lastErr = e; }
  }
  throw lastErr;
}

// ── Fetch scores via Cloudflare Worker (proxy CORS) ───────────
// Le Worker relaie api.football-data.org avec ta clé côté serveur.
// Sans restriction CORS → scores temps réel dans le navigateur.
async function fetchAPIMatches() {
  if (!FOOTBALL_API_PROXY_URL || FOOTBALL_API_PROXY_URL === "TON_WORKER_URL_ICI") {
    dbg("Worker non configuré — scores via sheet uniquement");
    return [];
  }
  // Fenêtre glissante : J-2 → J+1 pour ne pas rater les matchs
  // joués la veille (après minuit) ou en cours de soirée
  const now = new Date();
  const from = new Date(now); from.setDate(from.getDate() - 2);
  const to   = new Date(now); to.setDate(to.getDate() + 1);
  const fmt  = d => d.toISOString().split("T")[0];
  const base = FOOTBALL_API_PROXY_URL.replace(/\/$/, "");
  const url = `${base}/competitions/WC/matches?dateFrom=${fmt(from)}&dateTo=${fmt(to)}`;
  try {
    const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
    if (!res.ok) {
      dbg(`Worker HTTP ${res.status} — scores via sheet`);
      return [];
    }
    const data = await res.json();
    return data.matches || [];
  } catch(e) {
    dbg(`Worker inaccessible (${e.message}) — scores via sheet`);
    return [];
  }
}

// ── Calcul résultat d'un pronostic ────────────────────────────
function computeResult(pronoStr, scoreA, scoreB, status) {
  if (status !== "FINISHED" && status !== "IN_PLAY" && status !== "PAUSED") return null;
  if (scoreA === null || scoreB === null) return null;
  const parts = pronoStr.split("-");
  if (parts.length !== 2) return null;
  const pA = parseInt(parts[0]), pB = parseInt(parts[1]);
  if (isNaN(pA) || isNaN(pB)) return null;

  if (pA === scoreA && pB === scoreB) return { pts: 2, icon: "✅", label: "2pts" };

  const realWinner = scoreA > scoreB ? "A" : scoreB > scoreA ? "B" : "N";
  const pronoWinner = pA > pB ? "A" : pB > pA ? "B" : "N";
  if (realWinner === pronoWinner) return { pts: 1, icon: "🟡", label: "1pt" };

  return { pts: 0, icon: "❌", label: "0pt" };
}

// ── Formatage heure locale ─────────────────────────────────────
// Tente de parser une date dans n'importe quel format courant
// (ISO, DD/MM/YYYY HH:MM, DD/MM/YYYY, etc.)
function parseDate(str) {
  if (!str) return null;
  str = str.trim();
  // ISO standard → direct
  let d = new Date(str);
  if (!isNaN(d)) return d;
  // DD/MM/YYYY HH:MM ou DD/MM/YYYY HH:MM:SS
  let m = str.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})(?:[T\s](\d{2}):(\d{2})(?::(\d{2}))?)?/);
  if (m) {
    d = new Date(
      parseInt(m[3]), parseInt(m[2]) - 1, parseInt(m[1]),
      parseInt(m[4] || 0), parseInt(m[5] || 0), parseInt(m[6] || 0)
    );
    if (!isNaN(d)) return d;
  }
  // MM/DD/YYYY (format américain)
  m = str.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})/);
  if (m) {
    d = new Date(parseInt(m[3]), parseInt(m[1]) - 1, parseInt(m[2]));
    if (!isNaN(d)) return d;
  }
  // DD/MM HHhMM ou DD/MM HH:MM (sans année — on suppose l'année courante)
  // ex: "16/06 21h", "16/06 21h00", "16/06 21:00"
  m = str.match(/(\d{1,2})[\/](\d{1,2})\s*(\d{1,2})[h:](\d{0,2})/);
  if (m) {
    const year = new Date().getFullYear();
    d = new Date(year, parseInt(m[2]) - 1, parseInt(m[1]),
      parseInt(m[3]), parseInt(m[4] || 0));
    if (!isNaN(d)) return d;
  }
  // DD/MM sans heure
  m = str.match(/^(\d{1,2})[\/\-\.](\d{1,2})$/);
  if (m) {
    const year = new Date().getFullYear();
    d = new Date(year, parseInt(m[2]) - 1, parseInt(m[1]));
    if (!isNaN(d)) return d;
  }
  return null;
}

function formatTime(utcStr) {
  const d = parseDate(utcStr);
  if (!d) return "--:--";
  return d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
}

function todayLabel() {
  return new Date().toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
}

// ── Rendu d'une carte match ───────────────────────────────────
// matchPronos : [{joueur, prono}] déjà filtrés pour ce match
// isPast : booléen — applique le style grisé/désaturé
function renderMatchCard(match, matchPronos, matchsSheet, sheetMatchID, i, isPast = false) {
  const { homeTeam, awayTeam, utcDate, status, score } = match;
  const teamA = homeTeam.name;
  const teamB = awayTeam.name;
  const flagA = getFlag(teamA);
  const flagB = getFlag(teamB);
  const scoreA = score?.fullTime?.home ?? score?.regularTime?.home ?? null;
  const scoreB = score?.fullTime?.away ?? score?.regularTime?.away ?? null;

  // Score dans le sheet (fallback manuel)
  const sheetRow = matchsSheet.find(r => r.MatchID === sheetMatchID);
  const sheetScoreA = sheetRow?.["Score A"] !== undefined && sheetRow["Score A"] !== "" ? parseInt(sheetRow["Score A"]) : null;
  const sheetScoreB = sheetRow?.["Score B"] !== undefined && sheetRow["Score B"] !== "" ? parseInt(sheetRow["Score B"]) : null;

  // Priorité : score API, sinon sheet
  const realScoreA = scoreA !== null ? scoreA : sheetScoreA;
  const realScoreB = scoreB !== null ? scoreB : sheetScoreB;
  const realStatus = status || (sheetScoreA !== null ? "FINISHED" : "TIMED");

  const now = new Date();
  const kickoff = parseDate(utcDate) || new Date(utcDate);
  const started = now >= kickoff;

  // Statut badge
  let statusLabel, statusClass;
  if (realStatus === "FINISHED") { statusLabel = "Terminé"; statusClass = "status-finished"; }
  else if (realStatus === "IN_PLAY" || realStatus === "PAUSED") { statusLabel = "🔴 En cours"; statusClass = "status-live"; }
  else { statusLabel = `⏰ ${formatTime(utcDate)}`; statusClass = "status-upcoming"; }

  // Score ou placeholder
  let scoreHTML;
  if (realStatus === "FINISHED" || realStatus === "IN_PLAY" || realStatus === "PAUSED") {
    scoreHTML = `<div class="score-digits">${realScoreA ?? "?"}<span class="score-sep"> - </span>${realScoreB ?? "?"}</div>`;
    if (realStatus !== "FINISHED") scoreHTML += `<div class="score-time">Live</div>`;
  } else {
    // Avant le match : 0 - 0 grisé + heure de coup d'envoi
    const timeStr = formatTime(utcDate);
    scoreHTML = `
      <div class="score-digits score-upcoming">0<span class="score-sep"> - </span>0</div>
      <div class="score-time">coup d'envoi ${timeStr}</div>`;
  }

  // Pronostics section
  const cardId = `card-${sheetMatchID.replace(/[^a-z0-9]/gi,"-")}`;
  let pronosHTML;
  if (!started) {
    pronosHTML = `<p class="hidden-prono">🔒 Pronostics révélés au coup d'envoi</p>`;
  } else {
    const chips = matchPronos.map(p => {
      const res = computeResult(p.prono, realScoreA, realScoreB, realStatus);
      return `
        <div class="prono-chip">
          <span class="prono-name">${escHtml(p.joueur)}</span>
          <span class="prono-right">
            <span class="prono-score">${escHtml(p.prono)}</span>
            ${res ? `<span class="prono-result" title="${res.label}">${res.icon}</span>` : ""}
          </span>
        </div>`;
    }).join("");
    // Tiroir toujours fermé par défaut
    pronosHTML = `
      <button class="pronos-toggle" onclick="togglePronos('${cardId}')" aria-expanded="false">
        <div class="pronos-toggle-left">
          <div class="pronos-toggle-icon-btn">👥</div>
          <span class="pronos-toggle-label">Pronostics</span>
          <span class="pronos-toggle-count">${matchPronos.length} participants</span>
        </div>
        <span class="pronos-toggle-chevron" id="icon-${cardId}">▼</span>
      </button>
      <div class="pronos-body" id="body-${cardId}">
        <div class="pronos-grid" style="padding-bottom:0.85rem">${chips}</div>
      </div>`;
  }

  const group = match.group ? `Groupe ${match.group.replace("GROUP_","").replace("_"," ")}` : "Poules";
  const delay = `animation-delay: ${i * 0.06}s`;
  const pastClass = isPast ? " card-past" : "";

  return `
  <div class="match-card${pastClass}" style="${delay}">
    <div class="card-header">
      <div class="match-meta">
        <span class="match-group">${escHtml(group)}</span>
        <span class="match-status ${statusClass}">${statusLabel}</span>
      </div>
      <div class="teams-row">
        <div class="team">
          <div class="team-flag">${flagA}</div>
          <div class="team-name">${escHtml(teamA)}</div>
        </div>
        <div class="score-block">${scoreHTML}</div>
        <div class="team">
          <div class="team-flag">${flagB}</div>
          <div class="team-name">${escHtml(teamB)}</div>
        </div>
      </div>
    </div>
    <div class="pronos-section">
      ${pronosHTML}
    </div>
  </div>`;
}

// ── Rendu classement ──────────────────────────────────────────
// pronosData : { joueurs: string[], byMatchID: Map<string, {joueur, prono}[]> }
function renderRanking(matchsSheet, pronosData, apiMatches) {
  const scores = {};

  // Initialise tous les joueurs connus (même ceux à 0 pt)
  for (const j of pronosData.joueurs) {
    scores[j] = { pts: 0, played: 0, exact: 0, good: 0 };
  }

  // Rassemble tous les matchs terminés avec leurs scores
  const finishedMatches = new Map(); // mid → {sA, sB}
  for (const m of apiMatches) {
    if (m.status !== "FINISHED") continue;
    const sA = m.score?.fullTime?.home ?? null;
    const sB = m.score?.fullTime?.away ?? null;
    if (sA === null) continue;
    const mid = resolveSheetMatchID(m, matchsSheet);
    finishedMatches.set(mid, { sA, sB });
    // aussi indexer par id API brut
    finishedMatches.set(String(m.id), { sA, sB });
  }

  // Scores manuels du sheet Matchs
  for (const r of matchsSheet) {
    const sA = r["Score A"] !== undefined && r["Score A"] !== "" ? parseInt(r["Score A"]) : null;
    const sB = r["Score B"] !== undefined && r["Score B"] !== "" ? parseInt(r["Score B"]) : null;
    if (sA === null || sB === null || !r.MatchID) continue;
    if (!finishedMatches.has(r.MatchID)) finishedMatches.set(r.MatchID, { sA, sB });
  }

  // Calcul des points depuis les pronostics (format large)
  for (const [mid, pronos] of pronosData.byMatchID) {
    const fm = finishedMatches.get(mid);
    if (!fm) continue;
    for (const { joueur, prono } of pronos) {
      if (!scores[joueur]) scores[joueur] = { pts: 0, played: 0, exact: 0, good: 0 };
      const res = computeResult(prono, fm.sA, fm.sB, "FINISHED");
      if (!res) continue;
      scores[joueur].played++;
      scores[joueur].pts += res.pts;
      if (res.pts === 2) scores[joueur].exact++;
      if (res.pts === 1) scores[joueur].good++;
    }
  }

  const sorted = Object.entries(scores).sort((a, b) =>
    b[1].pts - a[1].pts || b[1].exact - a[1].exact || b[1].good - a[1].good
  );

  if (sorted.length === 0) {
    return `<div class="state-block"><div class="state-icon">📊</div><p>Aucun joueur détecté dans le Google Sheets.</p></div>`;
  }

  const medals = ["🥇","🥈","🥉"];
  const podiumClass = ["podium-1","podium-2","podium-3"];

  const rows = sorted.map(([name, s], idx) => {
    const rank = idx < 3 ? medals[idx] : `<span class="rank-number">${idx + 1}</span>`;
    const pc = idx < 3 ? podiumClass[idx] : "";
    return `
      <tr class="${pc}">
        <td class="rank-cell">${rank}</td>
        <td class="player-name">${escHtml(name)}</td>
        <td class="pts-cell">${s.pts}</td>
        <td class="stat-cell">${s.played}</td>
        <td class="stat-cell">${s.exact}</td>
        <td class="stat-cell">${s.good}</td>
      </tr>`;
  }).join("");

  return `
    <table class="ranking-table" aria-label="Classement">
      <thead>
        <tr>
          <th>#</th>
          <th>Joueur</th>
          <th>Pts</th>
          <th>Joués</th>
          <th>Exacts</th>
          <th>Bons</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function escHtml(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Parsing du sheet Pronostics (format large) ────────────────
// Entrée  : tableau de lignes CSV parsées (objets clé→valeur)
//           en-tête : MatchID | Match | Joueur1 | Joueur2 | …
// Sortie  : { joueurs: string[], byMatchID: Map<string, {joueur, prono}[]> }
function parsePronos(rows) {
  if (!rows.length) return { joueurs: [], byMatchID: new Map() };

  // Les joueurs sont toutes les colonnes à partir de la 3e (index 2+)
  const allKeys = Object.keys(rows[0]);
  const col0 = allKeys[0]; // MatchID
  const col1 = allKeys[1]; // Match (label lisible ex: "France - Sénégal")
  const joueurs = allKeys.slice(2).filter(k => k.trim() !== "");

  const byMatchID = new Map();
  for (const row of rows) {
    const mid = (row[col0] || "").trim();
    const matchLabel = (row[col1] || "").trim(); // ex: "France - Sénégal"
    if (!mid && !matchLabel) continue;

    const list = [];
    for (const joueur of joueurs) {
      const prono = (row[joueur] || "").trim();
      if (prono) list.push({ joueur, prono });
    }
    if (list.length === 0) continue;

    // Indexé par MatchID ET par le label du match (fallback)
    if (mid) byMatchID.set(mid, list);
    if (matchLabel) byMatchID.set(matchLabel.toLowerCase(), list);
  }
  return { joueurs, byMatchID };
}

// ── Cycle de rafraîchissement ─────────────────────────────────
let apiMatches = [], matchsSheet = [], pronosData = { joueurs: [], byMatchID: new Map() };

async function loadAll() {
  const dot = document.getElementById("refresh-dot");
  dot.classList.add("refreshing");

  try {
    const [apiRes, sheetMatchs, sheetPronos] = await Promise.allSettled([
      fetchAPIMatches(),
      fetchCSV(SHEET_MATCHS_URL),
      fetchCSV(SHEET_PRONOS_URL)
    ]);

    if (apiRes.status === "fulfilled") apiMatches = apiRes.value;

    if (sheetMatchs.status === "fulfilled") {
      matchsSheet = sheetMatchs.value;
    } else {
      console.error("Sheet Matchs KO:", sheetMatchs.reason);
    }

    if (sheetPronos.status === "fulfilled") {
      pronosData = parsePronos(sheetPronos.value);
    } else {
      console.error("Sheet Pronos KO:", sheetPronos.reason);
    }

    // ── Debug panel ───────────────────────────────────────────
    const dbgEl = document.getElementById("debug-panel");
    if (dbgEl) {
      const matchsStatus = sheetMatchs.status === "fulfilled"
        ? `✅ ${matchsSheet.length} ligne(s) — colonnes : ${Object.keys(matchsSheet[0] || {}).join(" | ")}`
        : `❌ ${sheetMatchs.reason}`;
      const pronosRaw = sheetPronos.status === "fulfilled" ? sheetPronos.value : [];
      const pronosStatus = sheetPronos.status === "fulfilled"
        ? `✅ ${pronosRaw.length} ligne(s) — colonnes : ${Object.keys(pronosRaw[0] || {}).join(" | ")}`
        : `❌ ${sheetPronos.reason}`;
      const byMatchKeys = [...pronosData.byMatchID.keys()];
      dbgEl.innerHTML = `
        <b>Sheet Matchs :</b> ${matchsStatus}<br>
        <b>Sheet Pronos :</b> ${pronosStatus}<br>
        <b>MatchIDs détectés dans Pronos :</b> ${byMatchKeys.length ? byMatchKeys.join(", ") : "(aucun)"}<br>
        <b>Joueurs détectés :</b> ${pronosData.joueurs.length ? pronosData.joueurs.join(", ") : "(aucun)"}<br>
        <b>Matchs sheet Matchs :</b> ${matchsSheet.map(r => r["Équipe A"] + " vs " + r["Équipe B"] + " (ID: " + r.MatchID + ")").join(" · ") || "(aucun)"}
      `;
      dbgEl.style.display = "block";
    }
    // ─────────────────────────────────────────────────────────

    renderAll();

    const ts = new Date().toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    document.getElementById("last-update").textContent = `Dernière mise à jour : ${ts}`;
  } catch(e) {
    console.error(e);
  } finally {
    dot.classList.remove("refreshing");
  }
}

function renderAll() {
  const matchsContainer = document.getElementById("matchs-container");
  const now = new Date();

  // ── Enrichit le sheet avec les scores API ─────────────────
  for (const m of apiMatches) {
    const sA = m.score?.fullTime?.home ?? null;
    const sB = m.score?.fullTime?.away ?? null;
    if (sA === null) continue;
    const mid = resolveSheetMatchID(m, matchsSheet);
    const row = matchsSheet.find(r => r.MatchID === mid);
    if (row) {
      if (!row["Score A"]) row["Score A"] = String(sA);
      if (!row["Score B"]) row["Score B"] = String(sB);
    }
  }

  // ── Construit la liste complète depuis le sheet ───────────
  // Tous les matchs avec au moins un prono, quelle que soit la date.
  const allMatchs = matchsSheet
    .filter(r => r["Équipe A"] && r["Équipe B"])
    .map(r => {
      // Cherche le match correspondant dans l'API pour avoir le statut live
      const apiMatch = apiMatches.find(m => resolveSheetMatchID(m, matchsSheet) === r.MatchID);
      const sheetHasScore = r["Score A"] !== "" && r["Score B"] !== "" &&
                            r["Score A"] !== undefined && r["Score B"] !== undefined;
      // Statut : l'API est TOUJOURS autoritaire.
      // Le sheet ne peut déduire FINISHED que si l'API ne connaît pas ce match.
      let status, scoreHome, scoreAway;
      if (apiMatch) {
        // API trouvée → on prend tout depuis l'API
        status    = apiMatch.status;
        scoreHome = apiMatch.score?.fullTime?.home ?? null;
        scoreAway = apiMatch.score?.fullTime?.away ?? null;
        // Si l'API dit FINISHED mais n'a pas encore le score fullTime, fallback sheet
        if (status === "FINISHED" && scoreHome === null && sheetHasScore) {
          scoreHome = parseInt(r["Score A"]);
          scoreAway = parseInt(r["Score B"]);
        }
      } else {
        // Pas dans l'API (match futur hors fenêtre) → déduit du sheet
        status    = sheetHasScore ? "FINISHED" : "TIMED";
        scoreHome = sheetHasScore ? parseInt(r["Score A"]) : null;
        scoreAway = sheetHasScore ? parseInt(r["Score B"]) : null;
      }
      return {
        id: r.MatchID,
        homeTeam: { name: r["Équipe A"] },
        awayTeam: { name: r["Équipe B"] },
        utcDate: r.Date || "",
        status,
        score: { fullTime: { home: scoreHome, away: scoreAway } },
        group: apiMatch?.group || ""
      };
    })
    .map(m => {
      const sheetMatchID = m.id;
      const teamA = m.homeTeam.name;
      const teamB = m.awayTeam.name;
      const pronos =
        pronosData.byMatchID.get(sheetMatchID) ||
        pronosData.byMatchID.get(`${teamA} - ${teamB}`.toLowerCase()) ||
        pronosData.byMatchID.get(`${teamB} - ${teamA}`.toLowerCase()) ||
        [];
      return { match: m, sheetMatchID, pronos };
    })
    .filter(({ pronos }) => pronos.length > 0);

  if (allMatchs.length === 0) {
    matchsContainer.innerHTML = `<div class="state-block"><div class="state-icon">📅</div><p>Aucun pronostic saisi dans le Google Sheets.</p></div>`;
    document.getElementById("ranking-container").innerHTML = renderRanking(matchsSheet, pronosData, apiMatches);
    return;
  }

  // ── Classe chaque match : today / past ────────────────────
  // Date locale (pas UTC) pour éviter les décalages minuit
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}-${String(now.getDate()).padStart(2,"0")}`;

  // Retourne la date locale YYYY-MM-DD (sans conversion UTC)
  function getMatchDay(m) {
    const d = parseDate(m.match.utcDate);
    if (!d) return null;
    const y = d.getFullYear();
    const mo = String(d.getMonth() + 1).padStart(2, "0");
    const da = String(d.getDate()).padStart(2, "0");
    return `${y}-${mo}-${da}`;
  }

  const todayMatchs = allMatchs.filter(m => {
    // Aujourd'hui = même jour ET pas encore terminé
    // Un match FINISHED bascule en archive même s'il a lieu aujourd'hui
    const d = getMatchDay(m);
    const isToday = d === todayStr || d === null;
    const isDone = m.match.status === "FINISHED";
    return isToday && !isDone;
  });

  const pastMatchs = allMatchs
    .filter(m => {
      const d = getMatchDay(m);
      const isToday = d === todayStr || d === null;
      const isDone = m.match.status === "FINISHED";
      // Archive = jour passé OU terminé aujourd'hui
      return (d !== null && d < todayStr) || (isToday && isDone);
    })
    .sort((a, b) => {
      const dA = getMatchDay(a), dB = getMatchDay(b);
      return dB.localeCompare(dA); // plus récent en premier
    });

  // ── Groupes les matchs passés par jour ───────────────────
  const pastByDay = [];
  const seenDays = [];
  for (const item of pastMatchs) {
    const day = getMatchDay(item);
    if (!seenDays.includes(day)) {
      seenDays.push(day);
      pastByDay.push({ day, items: [] });
    }
    pastByDay.find(g => g.day === day).items.push(item);
  }

  // ── Rendu ────────────────────────────────────────────────
  let html = "";

  // Aujourd'hui
  if (todayMatchs.length > 0) {
    const label = todayLabel();
    html += `<div class="day-section">
      <div class="day-label day-today">${label} — aujourd'hui</div>
      ${todayMatchs.map(({ match, sheetMatchID, pronos }, i) =>
        renderMatchCard(match, pronos, matchsSheet, sheetMatchID, i, false)).join("")}
    </div>`;
  }

  // Séparateur archive
  if (pastByDay.length > 0) {
    html += `<div class="archive-divider">
      <div class="archive-divider-line"></div>
      <div class="archive-divider-label">Archive</div>
      <div class="archive-divider-line"></div>
    </div>`;

    for (const { day, items } of pastByDay) {
      const d = new Date(day + "T12:00:00");
      const label = d.toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long", year: "numeric" });
      html += `<div class="day-section">
        <div class="day-label day-past">${label}</div>
        ${items.map(({ match, sheetMatchID, pronos }, i) =>
          renderMatchCard(match, pronos, matchsSheet, sheetMatchID, i, true)).join("")}
      </div>`;
    }
  }

  matchsContainer.innerHTML = html;

  // ── Classement ──
  document.getElementById("ranking-container").innerHTML =
    renderRanking(matchsSheet, pronosData, apiMatches);
}

// ── Résolution du MatchID sheet depuis un objet match API ──────
function resolveSheetMatchID(match, matchsSheet) {
  const teamA = match.homeTeam.name;
  const teamB = match.awayTeam.name;
  const row = matchsSheet.find(r =>
    r["Équipe A"]?.toLowerCase() === teamA.toLowerCase() &&
    r["Équipe B"]?.toLowerCase() === teamB.toLowerCase()
  ) || matchsSheet.find(r =>
    r["Équipe A"]?.toLowerCase().includes(teamA.split(" ")[0].toLowerCase()) &&
    r["Équipe B"]?.toLowerCase().includes(teamB.split(" ")[0].toLowerCase())
  );
  return row?.MatchID || String(match.id);
}

// ── Refresh manuel ───────────────────────────────────────────
async function manualRefresh() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  btn.disabled = true;
  await loadAll();
  btn.classList.remove("spinning");
  btn.disabled = false;
}

// ── Fermeture modal debug au clic sur l'overlay ─────────────
document.getElementById("debug-overlay").addEventListener("click", function(e) {
  if (e.target === this) this.style.display = "none";
});

// ── Init ──────────────────────────────────────────────────────
loadAll();
setInterval(loadAll, REFRESH_INTERVAL);
</script>
